<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简历优化工具</title>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="https://unpkg.com/pdfjs-dist@3.4.120/build/pdf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; }
    :root {
      --bg: #f0f7ff; --bg-gradient-start: #e6f0ff; --bg-gradient-end: #f8fafc;
      --card: #ffffff; --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      --border: #e2e8f0; --main: #0ea5e9; --text: #0f172a; --subtext: #64748b;
      --success: #10b981; --warning: #f59e0b; --radius-lg: 16px; --radius-md: 12px;
    }
    body { background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%); min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 720px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 2.5rem; padding: 2rem; background: rgba(255,255,255,0.8); border-radius: 20px; backdrop-filter: blur(10px); }
    .header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, var(--main) 0%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: white; border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: var(--card-shadow); }
    .label { font-size: 15px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .label::before { content: ''; width: 4px; height: 16px; background: var(--main); border-radius: 2px; }
    #resumeFile { width: 100%; padding: 20px; border: 2px dashed var(--border); border-radius: var(--radius-md); cursor: pointer; }
    textarea { width: 100%; min-height: 160px; padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--border); font-size: 14px; resize: vertical; outline: none; }
    textarea:focus { border-color: var(--main); }
    select, input[type="password"], input[type="text"] { padding: 12px 16px; border-radius: var(--radius-md); border: 1px solid var(--border); font-size: 14px; outline: none; }
    .btn { width: 100%; height: 54px; border-radius: var(--radius-md); font-size: 16px; font-weight: 600; border: none; background: linear-gradient(135deg, var(--main) 0%, #06b6d4 100%); color: white; cursor: pointer; margin: 10px 0 20px; }
    .btn-small { padding: 8px 16px; height: auto; font-size: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .status { text-align: center; color: var(--subtext); font-size: 14px; margin-bottom: 20px; padding: 12px; background: rgba(255,255,255,0.6); border-radius: var(--radius-md); }
    .status.success { color: var(--success); background: rgba(16,185,129,0.1); }
    .theme-panel { position: fixed; top: 20px; right: 20px; background: white; padding: 14px; border-radius: var(--radius-lg); box-shadow: 0 8px 32px rgba(0,0,0,0.15); z-index: 999; }
    .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .theme-btn { width: 28px; height: 28px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; }
    .theme-btn.active { border-color: var(--text); }
    .config-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .config-row input { flex: 1; }
    .tips { font-size: 12px; color: var(--subtext); padding-top: 8px; border-top: 1px dashed #f1f5f9; }
  </style>
</head>
<body>
  <div class="theme-panel">
    <div class="title" style="font-size:12px;color:#64748b;text-align:center;margin-bottom:10px;">主题颜色</div>
    <div class="theme-grid">
      <button class="theme-btn active" style="background:linear-gradient(135deg,#e6f0ff,#f8fafc)" onclick="setTheme('light-blue')"></button>
      <button class="theme-btn" style="background:linear-gradient(135deg,#ffffff,#fafafa)" onclick="setTheme('white')"></button>
      <button class="theme-btn" style="background:linear-gradient(135deg,#fdf8f3,#f5ebe0)" onclick="setTheme('khaki')"></button>
      <button class="theme-btn" style="background:linear-gradient(135deg,#f0fdf4,#fafafa)" onclick="setTheme('mint')"></button>
      <button class="theme-btn" style="background:linear-gradient(135deg,#fef3c7,#fef9c3)" onclick="setTheme('cream')"></button>
      <button class="theme-btn" style="background:linear-gradient(135deg,#fae8ff,#f5f3ff)" onclick="setTheme('lavender')"></button>
      <button class="theme-btn" style="background:linear-gradient(135deg,#dbeafe,#eff6ff)" onclick="setTheme('sky')"></button>
      <button class="theme-btn" style="background:linear-gradient(135deg,#ecfdf5,#f0fdf4)" onclick="setTheme('sage')"></button>
      <button class="theme-btn" style="background:linear-gradient(135deg,#fef9c3,#fefce8)" onclick="setTheme('butter')"></button>
    </div>
  </div>

  <div class="container">
    <div class="header">
      <div class="icon" style="font-size:40px;margin-bottom:1rem;">🎯</div>
      <h1>简历优化工具</h1>
      <p style="color:#64748b;font-size:15px;">上传简历文件，粘贴JD，一键生成优化版简历</p>
    </div>

    <div class="status" id="status">请上传简历并输入JD</div>

    <div class="card">
      <div class="label">⚙️ AI配置（可选）</div>
      <div class="config-row">
        <select id="aiModel" onchange="setAIConfig()">
          <option value="doubao">豆包</option>
          <option value="claude">Claude</option>
          <option value="gpt">GPT</option>
        </select>
        <input type="password" id="aiApiKey" placeholder="输入API密钥" oninput="setAIConfig()">
      </div>
      <div class="config-row" id="doubaoEndpointRow">
        <input type="text" id="doubaoEndpoint" placeholder="Endpoint ID (ep-xxxxx)" oninput="setAIConfig()" style="flex:1;">
      </div>
      <button class="btn-small" onclick="setAIConfig()" style="width:auto;">🔄 刷新配置</button>
      <div id="aiStatus" style="margin-top:10px;font-size:13px;color:#64748b;">⚠️ 未配置AI，将使用本地优化</div>
      <div class="tips">豆包：API密钥 + Endpoint ID（火山方舟创建推理接入点获取）</div>
    </div>

    <div class="card">
      <div class="label">📄 上传简历（仅支持PDF）</div>
      <input type="file" id="resumeFile" accept=".pdf">
      <div id="fileName" style="margin-top:10px;font-size:13px;color:#64748b;"></div>
    </div>

    <div class="card">
      <div class="label">🎯 粘贴目标岗位 JD</div>
      <textarea id="jdInput" placeholder="请粘贴JD内容..."></textarea>
    </div>

    <button class="btn" id="optimizeBtn">🚀 一键优化并下载</button>

    <div class="card">
      <div class="label">✨ 优化结果预览</div>
      <textarea id="resultOutput" readonly placeholder="优化结果将显示在这里..." style="min-height:240px;font-family:monospace;"></textarea>
    </div>
  </div>

  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.4.120/build/pdf.worker.min.js';</script>
  <script src="script.js"></script>
  <script>window.addEventListener('DOMContentLoaded', setAIConfig);</script>
</body>
</html>
