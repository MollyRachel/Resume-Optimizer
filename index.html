<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简历优化工具</title>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="https://unpkg.com/pdfjs-dist@3.4.120/build/pdf.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="theme-panel">
    <button class="theme-btn" style="background:#0ea5e9" onclick="setTheme('blue')"></button>
    <button class="theme-btn" style="background:#10b981" onclick="setTheme('green')"></button>
    <button class="theme-btn" style="background:#8b5cf6" onclick="setTheme('purple')"></button>
    <button class="theme-btn" style="background:#f97316" onclick="setTheme('orange')"></button>
  </div>

  <div class="container">
    <div class="header">
      <h1>简历优化工具</h1>
      <p>上传简历文件，粘贴JD，一键生成优化版简历</p>
    </div>

    <div class="status" id="status">请上传简历并输入JD</div>

    <div class="card">
      <div class="label">📄 上传简历（PDF / TXT）</div>
      <input type="file" id="resumeFile" accept=".pdf,.txt">
      <div class="filename" id="fileName"></div>
    </div>

    <div class="card">
      <div class="label">🎯 粘贴目标岗位 JD</div>
      <textarea id="jdInput" placeholder="请粘贴JD内容，例如：
岗位职责：
1. 负责产品版本发布与迭代
2. 推动研发流程AI转型
3. 数据分析与决策支持

任职要求：
- 本科及以上学历
- 英语四级以上
- 熟悉AI大模型应用"></textarea>
    </div>

    <button class="btn" id="optimizeBtn">🚀 一键优化简历</button>

    <div class="card">
      <div class="label">✨ 优化结果预览</div>
      <textarea id="resultOutput" readonly placeholder="优化结果将显示在这里..."></textarea>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
