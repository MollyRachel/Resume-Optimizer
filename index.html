<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>简历智能优化工具 - 适配B站/互联网JD</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="container">
<header>
<h1>📝 简历智能优化工具</h1>
<p>自动根据JD优化简历｜突出个人优势｜互联网风格｜B站/字节适配</p>
</header>
<div class="box">
<label>📄 粘贴你的原始简历</label>
<textarea id="resume" placeholder="请把你的简历完整粘贴到这里..."></textarea>
</div>
<div class="box">
<label>🎯 粘贴目标岗位JD</label>
<textarea id="jd" placeholder="请把岗位JD粘贴到这里..."></textarea>
</div>
<button id="optimizeBtn">🚀 一键优化简历</button>
<div class="result-box">
<label>✅ 优化后简历（可直接复制投递）</label>
<textarea id="result" readonly placeholder="优化结果将在这里显示..."></textarea>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
